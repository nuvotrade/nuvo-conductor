<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>NUVO CONDUCTOR</title>
<style>
:root{
  --bg:#07080d;--surface:#0e1018;--border:#1e2535;
  --text:#c8d0e0;--dim:#5a657a;--bright:#e8edf5;
  --green:#22c55e;--red:#ef4444;--amber:#f59e0b;--cyan:#06b6d4;
  --mono:'JetBrains Mono','Fira Code',monospace;
  --ui:'DM Sans','Inter',system-ui,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--ui);font-size:14px;min-height:100vh;padding:0 0 80px}
.header{border-bottom:1px solid var(--border);padding:16px 24px;display:flex;align-items:center;gap:16px;position:sticky;top:0;background:var(--bg);z-index:100}
.logo{font-family:var(--mono);font-size:11px;letter-spacing:3px;color:var(--amber)}
.logo span{color:var(--dim)}
.vix-pill{margin-left:auto;font-family:var(--mono);font-size:11px;padding:4px 10px;border:1px solid var(--border);border-radius:3px;color:var(--dim)}
.vix-pill.allow{border-color:var(--green);color:var(--green)}
.vix-pill.warn{border-color:var(--amber);color:var(--amber)}
.vix-pill.block{border-color:var(--red);color:var(--red)}
.main{max-width:900px;margin:0 auto;padding:28px 24px}
.input-row{display:flex;gap:12px;align-items:flex-end;margin-bottom:20px;flex-wrap:wrap}
.field{display:flex;flex-direction:column;gap:6px}
.field label{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--dim)}
.field input{background:var(--surface);border:1px solid var(--border);color:var(--bright);padding:10px 14px;border-radius:4px;font-family:var(--mono);font-size:18px;font-weight:700;text-transform:uppercase;letter-spacing:2px;width:120px;outline:none;transition:border-color .15s}
.field input:focus{border-color:var(--amber)}
.field input.sm{font-size:14px;font-weight:400;letter-spacing:0;width:130px;text-transform:none}
.run-btn{background:var(--amber);color:#000;border:none;padding:12px 36px;border-radius:4px;font-family:var(--mono);font-size:12px;font-weight:700;letter-spacing:2px;cursor:pointer;text-transform:uppercase;align-self:flex-end}
.run-btn:hover{opacity:.9}.run-btn:disabled{opacity:.4;cursor:not-allowed}
.status{font-size:11px;font-family:var(--mono);color:var(--dim);min-height:20px;margin-bottom:20px}
.status.running{color:var(--amber)}.status.done{color:var(--green)}.status.err{color:var(--red)}

/* MARKET BAR */
.mbar{display:none;background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:12px 18px;margin-bottom:20px;flex-wrap:wrap;gap:20px}
.mbar.on{display:flex}
.ms{display:flex;flex-direction:column;gap:2px}
.ms .l{font-size:10px;color:var(--dim)}
.ms .v{font-family:var(--mono);font-size:12px;color:var(--bright)}
.ms .v.ok{color:var(--green)}.ms .v.w{color:var(--amber)}.ms .v.e{color:var(--red)}
.msep{width:1px;background:var(--border);align-self:stretch}

/* NMR REFERENCE BAR */
.nmr-bar{display:none;background:rgba(245,158,11,.05);border:1px solid rgba(245,158,11,.2);border-radius:6px;padding:10px 18px;margin-bottom:20px;flex-wrap:wrap;gap:20px;align-items:center}
.nmr-bar.on{display:flex}
.nmr-label{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--amber);margin-right:4px}
.nmr-note{font-size:10px;color:var(--dim);margin-left:auto}

/* CARDS */
.cards{display:flex;flex-direction:column;gap:12px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden}
.card.rank1{border-color:var(--amber);border-width:2px}
.card-head{padding:14px 20px;display:flex;align-items:center;gap:10px}
.struct-tag{font-family:var(--mono);font-size:11px;font-weight:700;letter-spacing:1px;padding:4px 10px;border-radius:3px}
.st-csp{background:rgba(34,197,94,.15);color:var(--green);border:1px solid rgba(34,197,94,.3)}
.st-bps{background:rgba(6,182,212,.15);color:var(--cyan);border:1px solid rgba(6,182,212,.3)}
.st-shares{background:rgba(245,158,11,.15);color:var(--amber);border:1px solid rgba(245,158,11,.3)}
.rank-tag{margin-left:auto;font-family:var(--mono);font-size:10px;color:var(--amber);letter-spacing:1px}
.card-body{padding:0 20px 20px}

/* EXECUTION LEVELS */
.exec{background:rgba(0,0,0,.3);border-radius:6px;padding:16px 20px;margin-bottom:14px}
.exec-title{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--dim);margin-bottom:12px}
.exec-levels{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px}
.elev .lbl{font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.elev .val{font-family:var(--mono);font-size:20px;font-weight:700;color:var(--bright)}
.elev .val.amber{color:var(--amber)}
.elev .val.green{color:var(--green)}
.elev .sub{font-size:11px;color:var(--dim);margin-top:2px}

/* METRICS */
.metrics{display:flex;gap:20px;flex-wrap:wrap;margin-bottom:14px}
.met .lbl{font-size:10px;color:var(--dim)}
.met .val{font-family:var(--mono);font-size:14px;color:var(--bright)}
.met .val.g{color:var(--green)}.met .val.a{color:var(--amber)}.met .val.r{color:var(--red)}

/* ORDER */
.order{background:var(--bg);border:1px solid rgba(34,197,94,.3);border-radius:4px;padding:12px 16px}
.order-line{font-family:var(--mono);font-size:13px;color:var(--green);line-height:1.8}
</style>
</head>
<body>
<div class="header">
  <div class="logo">NUVO<span> // </span>CONDUCTOR</div>
  <div class="vix-pill" id="vix-pill">VIX —</div>
</div>
<div class="main">
  <div class="input-row">
    <div class="field"><label>Ticker</label><input id="ticker" value="SOFI" maxlength="8"></div>
    <div class="field"><label>AUM ($)</label><input class="sm" id="aum" type="number" value="100000"></div>
    <button class="run-btn" id="run-btn" onclick="runAll()">&#9654; SCAN</button>
  </div>
  <div class="status" id="status">Enter ticker and press SCAN.</div>
  <div class="mbar" id="mbar"></div>
  <div class="nmr-bar" id="nmr-bar"></div>
  <div class="cards" id="cards"></div>
</div>

<script>
// ============================================================
// MATH ENGINE — pure computation, no structural gates
// Structures ranked by EV / risk-at-loss
// NMR shown as reference only, never blocks
// pTrue (HV30) drives EV — pMarket (IV) measures edge only
// ============================================================

const r2 = n => Math.round((+n||0)*100)/100;
const r4 = n => Math.round((+n||0)*10000)/10000;

function normCDF(x) {
  const a1=0.319381530, a2=-0.356563782, a3=1.781477937, a4=-1.821255978, a5=1.330274429;
  const sign = x < 0 ? -1 : 1;
  const z = Math.abs(x);
  const t = 1 / (1 + 0.2316419 * z);
  const poly = a1*t + a2*t*t + a3*t*t*t + a4*t*t*t*t + a5*t*t*t*t*t;
  const pdf = Math.exp(-0.5*z*z) / Math.sqrt(2*Math.PI);
  const cdf = 1 - pdf * poly;
  return sign === 1 ? cdf : 1 - cdf;
}

// P(underlying expires above strike)
function probAbove(spot, strike, vol, dte) {
  if (!(spot>0) || !(strike>0) || !(vol>0) || !(dte>0)) return null;
  const T = dte / 365;
  const d2 = (Math.log(spot/strike) - 0.5*vol*vol*T) / (vol*Math.sqrt(T));
  return r4(normCDF(d2));
}

// 1σ expected move
function expectedMove(spot, iv, dte) {
  return r2(spot * iv * Math.sqrt(dte/365));
}

// Strike increment by price
function inc(spot) {
  return spot < 25 ? 0.5 : spot < 500 ? 1 : 5;
}

// Next Friday from today + dte days
function nextFriday(dte) {
  const d = new Date();
  d.setDate(d.getDate() + Math.max(dte, 1));
  const dow = d.getDay();
  if (dow !== 5) d.setDate(d.getDate() + ((5-dow+7)%7));
  return d.toISOString().slice(0,10);
}

function expFmt(ds) {
  return new Date(ds+'T12:00:00')
    .toLocaleDateString('en-US',{month:'short',day:'2-digit'})
    .replace(',','').toUpperCase();
}

// Min credit floors — DTE-scaled to annualized RoR, hard min $0.15
const MIN_CREDIT = 0.15;
function minCreditCSP(strike, rorAnnual, dte) {
  return Math.max(MIN_CREDIT, r2(strike * rorAnnual * (dte/365)));
}
function minCreditBPS(width, rorAnnual, dte) {
  const scaled = rorAnnual * (dte/365);
  return Math.max(MIN_CREDIT, r2((width * scaled) / (1 + scaled)));
}

// EV uses pTrue — model probability, not market-implied
// gain/loss in dollars per contract or per position
function ev(pTrue, gain, loss) {
  return r2(pTrue * gain - (1-pTrue) * loss);
}

// Capital efficiency = EV / risk-at-loss (not full collateral)
function capEff(evVal, riskAtLoss) {
  if (!(riskAtLoss > 0)) return null;
  return r4(evVal / riskAtLoss);
}

// ── REGIME — used only for sizing and min RoR, never to block ────────────────
const REGIMES = [
  {maxVix:14,  label:'NO FEAR',       ror:0.20, cspPct:0.05, bpsPct:0.03, sharePct:0.05},
  {maxVix:18,  label:'FEAR COOLING',  ror:0.20, cspPct:0.10, bpsPct:0.03, sharePct:0.05},
  {maxVix:22,  label:'FEAR BUILDING', ror:0.16, cspPct:0.10, bpsPct:0.03, sharePct:0.07},
  {maxVix:30,  label:'FEAR ELEVATED', ror:0.13, cspPct:0.10, bpsPct:0.03, sharePct:0.10},
  {maxVix:45,  label:'HEAVY FEAR',    ror:0.10, cspPct:0.075,bpsPct:0.03, sharePct:0.10},
  {maxVix:999, label:'PANIC',         ror:0.10, cspPct:0.05, bpsPct:0.03, sharePct:0.10},
];
function regime(vix) {
  if (vix == null) return REGIMES[3]; // default FEAR ELEVATED
  return REGIMES.find(r=>vix<r.maxVix) || REGIMES[REGIMES.length-1];
}

// ============================================================
// STRUCTURE EVALUATORS — math only, no blocking gates
// ============================================================

function evalCSP(spot, hv30, iv, vix, aum, dte=7) {
  const reg = regime(vix);
  const em = expectedMove(spot, iv, dte);
  const shortK = Math.round((spot - em) / inc(spot)) * inc(spot);
  const expiry = nextFriday(dte);

  const pTrue   = probAbove(spot, shortK, hv30, dte);
  const pMarket = probAbove(spot, shortK, iv,   dte);
  if (!pTrue || !pMarket) return null;

  const edgePP = r2((pTrue - pMarket) * 100);
  const popPct = r2(pMarket * 100);

  const minCred = minCreditCSP(shortK, reg.ror, dte);
  const breakeven = r2(shortK - minCred);
  const collateral = r2(shortK * 100);           // full assignment collateral
  const maxLoss = r2((shortK - minCred) * 100);  // credit-adjusted loss

  const evVal = ev(pTrue, minCred * 100, maxLoss);
  const eff = capEff(evVal, maxLoss);            // normalized to risk-at-loss

  const budget = r2(aum * reg.cspPct);
  const contracts = Math.max(1, Math.floor(budget / collateral));
  const totalColl = r2(contracts * collateral);

  return {
    structure: 'CSP', dte, expiry,
    shortStrike: shortK, longStrike: null,
    minCredit: minCred, breakeven,
    collateral, maxLoss, contracts, totalColl,
    em, pTrue, pMarket, edgePP, popPct, evVal, eff,
    regime: reg.label,
    brokerOrder: [
      `Sell to Open ${contracts} ${expFmt(expiry)} ${shortK}P @ $${minCred.toFixed(2)} limit`
    ],
    levels: {
      'Short Strike': {val:`$${shortK}`, cls:'amber', sub:'1σ placement'},
      'Min Credit':   {val:`$${minCred.toFixed(2)}`, cls:'green', sub:`${(reg.ror*100).toFixed(0)}% annualized floor`},
      'Breakeven':    {val:`$${breakeven}`, cls:'', sub:'credit-adjusted'},
      'Contracts':    {val:`${contracts}`, cls:'', sub:`$${totalColl.toLocaleString()} collateral`},
    }
  };
}

function evalBPS(spot, hv30, iv, vix, aum, dte=7, width=5) {
  const reg = regime(vix);
  const em = expectedMove(spot, iv, dte);
  const shortK = Math.round((spot - em) / inc(spot)) * inc(spot);
  const longK = shortK - width;
  const expiry = nextFriday(dte);

  const pTrue   = probAbove(spot, shortK, hv30, dte);
  const pMarket = probAbove(spot, shortK, iv,   dte);
  if (!pTrue || !pMarket) return null;

  const edgePP = r2((pTrue - pMarket) * 100);
  const popPct = r2(pMarket * 100);

  const minCred = minCreditBPS(width, reg.ror, dte);
  const breakeven = r2(shortK - minCred);
  const maxLoss = r2((width - minCred) * 100);
  const collateral = r2(width * 100);

  const evVal = ev(pTrue, minCred * 100, maxLoss);
  const eff = capEff(evVal, maxLoss);

  const budget = r2(aum * reg.bpsPct);
  const contracts = Math.max(1, Math.floor(budget / maxLoss));
  const totalColl = r2(contracts * collateral);

  return {
    structure: 'BPS', dte, expiry, width,
    shortStrike: shortK, longStrike: longK,
    minCredit: minCred, breakeven,
    collateral, maxLoss, contracts, totalColl,
    em, pTrue, pMarket, edgePP, popPct, evVal, eff,
    regime: reg.label,
    brokerOrder: [
      `Sell to Open ${contracts} ${expFmt(expiry)} ${shortK}P`,
      `Buy to Open  ${contracts} ${expFmt(expiry)} ${longK}P`,
      `Net credit target: $${minCred.toFixed(2)} / spread`,
    ],
    levels: {
      'Short Strike': {val:`$${shortK}`, cls:'amber', sub:'sell put'},
      'Long Strike':  {val:`$${longK}`,  cls:'amber', sub:'hedge leg'},
      'Min Credit':   {val:`$${minCred.toFixed(2)}`, cls:'green', sub:`${(reg.ror*100).toFixed(0)}% annualized floor`},
      'Contracts':    {val:`${contracts}`, cls:'', sub:`$${totalColl.toLocaleString()} width collateral`},
    }
  };
}

function evalShares(spot, hv30, iv, vix, aum, nmr) {
  const reg = regime(vix);
  const dte = 7;
  const em = expectedMove(spot, iv, dte);
  const refK = Math.round((spot - em) / inc(spot)) * inc(spot);

  const pTrue   = probAbove(spot, refK, hv30, dte);
  const pMarket = probAbove(spot, refK, iv,   dte);
  if (!pTrue || !pMarket) return null;

  const edgePP = r2((pTrue - pMarket) * 100);
  const popPct = r2(pMarket * 100);

  // Upside: min of expected move or distance to fair value
  const upside = nmr?.fair ? Math.min(em, Math.max(0, nmr.fair - spot)) : em;
  // Downside: distance to wholesale or 10% of spot as proxy
  const downside = nmr?.wholesale ? Math.max(0, spot - nmr.wholesale) : spot * 0.10;

  const budget = r2(aum * reg.sharePct);
  const shares = Math.max(1, Math.floor(budget / spot));
  const totalCost = r2(shares * spot);

  const evPerShare = r2(pTrue * upside - (1-pTrue) * downside);
  const evVal = r2(evPerShare * shares);
  const riskAtLoss = r2(Math.max(downside, 0.01) * shares);
  const eff = capEff(evVal, riskAtLoss);

  return {
    structure: 'SHARES', dte,
    entryPrice: spot, shares, totalCost,
    em, pTrue, pMarket, edgePP, popPct,
    evVal, eff,
    regime: reg.label,
    brokerOrder: [
      `Buy ${shares} shares @ market / limit $${spot.toFixed(2)}`,
      `Position size: ${(reg.sharePct*100).toFixed(0)}% AUM — $${totalCost.toLocaleString()}`,
    ],
    levels: {
      'Entry':      {val:`$${spot.toFixed(2)}`, cls:'amber', sub:'current spot'},
      'Shares':     {val:`${shares}`, cls:'amber', sub:`${(reg.sharePct*100).toFixed(0)}% AUM`},
      'Total Cost': {val:`$${totalCost.toLocaleString()}`, cls:'', sub:'capital deployed'},
      'EV':         {val:`$${evVal.toFixed(2)}`, cls: evVal>=0?'green':'', sub:'model expected value'},
    }
  };
}

// ── WORKER ───────────────────────────────────────────────────────────────────
const WORKER = 'https://conductor.yulgutierrez.workers.dev';

async function fetchMarket(ticker) {
  const ctrl = new AbortController();
  const t = setTimeout(() => ctrl.abort(), 15000);
  try {
    const r = await fetch(`${WORKER}/v1/market?ticker=${encodeURIComponent(ticker)}&bust=1`, {signal:ctrl.signal});
    clearTimeout(t);
    if (!r.ok) throw new Error(`HTTP_${r.status}`);
    const d = await r.json();
    if (d.error) throw new Error(d.error);
    if (!(d.spot > 0)) throw new Error('SPOT_MISSING');
    let hv30 = +(d.hv30||0); if (hv30>1) hv30=hv30/100;
    return {
      ticker, spot:d.spot, hv30:hv30||null, iv:d.iv||null, vix:d.vix||null,
      sma20:d.sma20||null,
      nmr: d.nmr || null,
      structural: d.structural || null,
    };
  } finally { clearTimeout(t); }
}

// ── RENDER ───────────────────────────────────────────────────────────────────
function setStatus(msg, cls='') {
  const el = document.getElementById('status');
  el.textContent = msg; el.className = 'status '+cls;
}

function updateVix(vix) {
  const el = document.getElementById('vix-pill');
  if (!vix) { el.textContent='VIX —'; el.className='vix-pill'; return; }
  el.textContent = `VIX ${vix.toFixed(1)}`;
  el.className = 'vix-pill ' + (vix<24?'allow':vix<45?'warn':'block');
}

function renderMarketBar(m) {
  const f = (l,v,c='') => `<div class="ms"><div class="l">${l}</div><div class="v ${c}">${v}</div></div>`;
  const sep = '<div class="msep"></div>';
  const ivhv = m.iv&&m.hv30 ? (m.iv/m.hv30).toFixed(2) : '—';
  const ivhvCls = m.iv&&m.hv30&&m.iv/m.hv30>=1.15 ? 'ok' : 'w';
  let h = '';
  h += f('Spot', `$${m.spot.toFixed(2)}`, 'ok');
  h += f('HV30', m.hv30 ? `${(m.hv30*100).toFixed(1)}%` : '—', m.hv30?'ok':'w');
  h += f('IV',   m.iv   ? `${(m.iv*100).toFixed(1)}%`   : '—', m.iv?'ok':'w');
  h += f('IV/HV', ivhv, ivhvCls);
  h += sep;
  h += f('SMA20', m.sma20 ? `$${m.sma20.toFixed(2)}` : '—');
  h += f('Trend', m.sma20 ? (m.spot>m.sma20?'BULL':'BEAR') : '—',
          m.sma20 ? (m.spot>m.sma20?'ok':'w') : '');
  document.getElementById('mbar').innerHTML = h;
  document.getElementById('mbar').classList.add('on');
}

function renderNmrBar(nmr) {
  if (!nmr) return;
  const f = (l,v) => `<div class="ms"><div class="l">${l}</div><div class="v">${v}</div></div>`;
  let h = '<span class="nmr-label">NMR Reference</span>';
  h += f('Wholesale', nmr.wholesale ? `$${nmr.wholesale.toFixed(2)}` : '—');
  h += f('Fair',      nmr.fair      ? `$${nmr.fair.toFixed(2)}`      : '—');
  h += f('Retail',    nmr.retail    ? `$${nmr.retail.toFixed(2)}`    : '—');
  h += f('Location',  nmr.location  || '—');
  h += '<span class="nmr-note">Reference only — not a trading gate</span>';
  document.getElementById('nmr-bar').innerHTML = h;
  document.getElementById('nmr-bar').classList.add('on');
}

function renderCards(results) {
  const container = document.getElementById('cards');
  container.innerHTML = '';

  results.forEach((r, i) => {
    if (!r) return;
    const rank = i + 1;
    const stClass = `st-${r.structure.toLowerCase()}`;
    const isTop = rank === 1;

    let html = `<div class="card ${isTop?'rank1':''}">
      <div class="card-head">
        <span class="struct-tag ${stClass}">${r.structure}</span>
        <span style="font-family:var(--mono);font-size:11px;color:var(--dim)">${r.regime}</span>
        ${isTop ? '<span class="rank-tag">&#9654; RANK #1 — MOST EFFICIENT</span>' : `<span class="rank-tag" style="color:var(--dim)">RANK #${rank}</span>`}
      </div>
      <div class="card-body">
        <div class="exec">
          <div class="exec-title">Execution Levels</div>
          <div class="exec-levels">
            ${Object.entries(r.levels).map(([k,v])=>`
              <div class="elev">
                <div class="lbl">${k}</div>
                <div class="val ${v.cls}">${v.val}</div>
                <div class="sub">${v.sub}</div>
              </div>`).join('')}
          </div>
        </div>
        <div class="metrics">
          <div class="met"><div class="lbl">POP</div><div class="val">${r.popPct?.toFixed(1)}%</div></div>
          <div class="met"><div class="lbl">Edge</div><div class="val ${r.edgePP>=5?'g':r.edgePP>=0?'a':'r'}">${r.edgePP>=0?'+':''}${r.edgePP?.toFixed(1)}pp</div></div>
          <div class="met"><div class="lbl">EV</div><div class="val ${r.evVal>=0?'g':'r'}">$${r.evVal?.toFixed(2)}</div></div>
          <div class="met"><div class="lbl">CapEff</div><div class="val a">${r.eff?.toExponential(2)??'—'}</div></div>
          <div class="met"><div class="lbl">pTrue</div><div class="val">${((r.pTrue||0)*100).toFixed(1)}%</div></div>
          <div class="met"><div class="lbl">pMarket</div><div class="val">${((r.pMarket||0)*100).toFixed(1)}%</div></div>
        </div>
        <div class="order">
          ${(r.brokerOrder||[]).map(l=>`<div class="order-line">${l}</div>`).join('')}
        </div>
      </div>
    </div>`;
    container.innerHTML += html;
  });
}

// ── MAIN ─────────────────────────────────────────────────────────────────────
async function runAll() {
  const ticker = document.getElementById('ticker').value.trim().toUpperCase();
  if (!/^[A-Z0-9.\-]{1,8}$/.test(ticker)) { setStatus('Invalid ticker.','err'); return; }
  const aum = +document.getElementById('aum').value || 100000;

  document.getElementById('run-btn').disabled = true;
  document.getElementById('run-btn').textContent = 'SCANNING...';
  document.getElementById('cards').innerHTML = '';
  document.getElementById('mbar').classList.remove('on');
  document.getElementById('nmr-bar').classList.remove('on');

  try {
    setStatus(`Fetching ${ticker}...`, 'running');
    const m = await fetchMarket(ticker);
    updateVix(m.vix);
    renderMarketBar(m);
    renderNmrBar(m.nmr);

    const {spot, hv30, iv, vix} = m;
    if (!hv30) throw new Error('HV30 unavailable');
    if (!iv)   throw new Error('IV unavailable');

    setStatus(`Computing CSP · BPS · Shares...`, 'running');

    // Evaluate all three — no structure blocked
    const csp    = evalCSP(spot, hv30, iv, vix, aum);
    const bps    = evalBPS(spot, hv30, iv, vix, aum);
    const shares = evalShares(spot, hv30, iv, vix, aum, m.nmr);

    // Rank by capital efficiency (EV / risk-at-loss)
    const ranked = [csp, bps, shares]
      .filter(r => r !== null)
      .sort((a,b) => (b.eff||0) - (a.eff||0));

    renderCards(ranked);

    const top = ranked[0];
    setStatus(
      `${top.structure} ranks #1 — CapEff ${top.eff?.toExponential(2)} · POP ${top.popPct?.toFixed(1)}% · Edge ${top.edgePP>=0?'+':''}${top.edgePP?.toFixed(1)}pp`,
      'done'
    );

  } catch(e) {
    setStatus(`Error: ${e.message}`, 'err');
    console.error(e);
  } finally {
    document.getElementById('run-btn').disabled = false;
    document.getElementById('run-btn').textContent = '▶ SCAN';
  }
}

document.getElementById('ticker').addEventListener('keydown', e => { if(e.key==='Enter') runAll(); });
</script>
</body>
</html>
